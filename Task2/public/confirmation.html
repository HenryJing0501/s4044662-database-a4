<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <h1>Booking Confirmation</h1>
  </header>

  <main class="page">
    <section class="panel">
      <p id="confirmationMessage" class="confirmation-message">Booking successfully created.</p>
      <p><a href="index.html">Back to search page</a></p>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get("status");
    const message = params.get("message");
    const confirmationMessage = document.getElementById("confirmationMessage");

    if (status === "failure") {
      confirmationMessage.textContent = message || "Booking failed.";
      confirmationMessage.classList.add("failure-message");
    } else {
      confirmationMessage.textContent = message || "Booking successfully created.";
    }
  </script>
</body>
</html>

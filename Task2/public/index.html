<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airbnb Booking Search</title>
  <link rel="stylesheet" href="style.css">
  <script src="index.js" defer></script>
</head>
<body>
  <header class="site-header">
    <h1>Airbnb Booking Search</h1>
  </header>

  <main class="page">
    <section class="panel">
      <h2>Search Listings</h2>

      <form id="searchForm" class="search-form">
        <div class="form-group">
          <label for="location">Location / market</label>
          <input type="text" id="location" name="location" required placeholder="Example: Rio De Janeiro">
        </div>

        <div class="form-group">
          <label for="propertyType">Property type</label>
          <select id="propertyType" name="property_type">
            <option value="">Any property type</option>
            <option value="Apartment">Apartment</option>
            <option value="House">House</option>
            <option value="Condominium">Condominium</option>
            <option value="Loft">Loft</option>
            <option value="Guesthouse">Guesthouse</option>
            <option value="Townhouse">Townhouse</option>
            <option value="Villa">Villa</option>
            <option value="Bed and breakfast">Bed and breakfast</option>
            <option value="Serviced apartment">Serviced apartment</option>
          </select>
        </div>

        <div class="form-group">
          <label for="bedrooms">Bedrooms</label>
          <select id="bedrooms" name="bedrooms">
            <option value="">Any number</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>

        <button type="submit">Search</button>
      </form>
    </section>

    <section class="panel">
      <h2>Listings</h2>
      <div id="statusMessage" class="status-message"></div>
      <div id="results" class="listing-grid"></div>
    </section>
  </main>
</body>
</html>
